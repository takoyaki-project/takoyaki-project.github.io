name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # ユーザーサイト（https://takoyaki-project.github.io/）はサブパスなしのため空。
      VITE_BASE_PATH: ""
      VITE_SITE_URL: "https://takoyaki-project.github.io"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static)
        run: bun run build

      - name: Add SPA fallback and .nojekyll
        run: |
          touch dist/client/.nojekyll
          # クライアントサイドルーティングのフォールバック
          if [ -f dist/client/index.html ] && [ ! -f dist/client/404.html ]; then
            cp dist/client/index.html dist/client/404.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
